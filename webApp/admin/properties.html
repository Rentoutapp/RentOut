<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>RentOut Admin — Properties</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: { extend: { colors: { primary:'#1B4FFF', secondary:'#FF6B35', success:'#22C55E', danger:'#EF4444', warning:'#F59E0B' } } }
    }
  </script>
  <style>
    @keyframes fadeInUp { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }
    @keyframes spin { to{transform:rotate(360deg)} }
    .fade-in-up { animation: fadeInUp 0.5s ease forwards; }
    .spinner { animation: spin 0.9s linear infinite; }
    .btn { transition: transform 0.15s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.15s ease; }
    .btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,0,0,0.15); }
    .btn:active { transform: scale(0.93); }
    .nav-link { transition: all 0.2s ease; }
    .nav-link:hover { background: rgba(255,255,255,0.15); transform: translateX(4px); }
    .nav-link.active { background: rgba(255,255,255,0.2); font-weight: 700; }
    .row-pending { background: #FFFBEB; }
    .row-approved { background: #F0FDF4; }
    .row-rejected { background: #FFF5F5; }
  </style>
</head>
<body class="bg-gray-50 min-h-screen flex">

  <!-- Auth overlay — covers entire page until admin is confirmed. Removed by JS. -->
  <div id="auth-overlay" style="position:fixed;inset:0;z-index:9999;background:#1B4FFF;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:16px;">
    <div style="width:48px;height:48px;border:4px solid rgba(255,255,255,0.3);border-top-color:white;border-radius:50%;animation:spin 0.8s linear infinite;"></div>
    <span style="color:white;font-family:sans-serif;font-size:14px;opacity:0.85;">Verifying credentials…</span>
    <style>@keyframes spin{to{transform:rotate(360deg)}}</style>
  </div>

  <!-- Sidebar -->
  <aside class="w-64 bg-gradient-to-b from-blue-900 to-primary min-h-screen flex flex-col fixed left-0 top-0 z-10">
    <div class="p-6 border-b border-white border-opacity-20">
      <div class="flex items-center gap-3">
        <div class="w-10 h-10 bg-white bg-opacity-20 rounded-xl flex items-center justify-center"><span class="text-xl">🏠</span></div>
        <div><div class="text-white font-extrabold text-lg">RentOut</div><div class="text-blue-200 text-xs">Admin Panel</div></div>
      </div>
    </div>
    <nav class="flex-1 p-4 space-y-1">
      <a href="dashboard.html" class="nav-link flex items-center gap-3 text-blue-100 px-4 py-3 rounded-xl text-sm"><span>📊</span> Dashboard</a>
      <a href="properties.html" class="nav-link active flex items-center gap-3 text-white px-4 py-3 rounded-xl text-sm"><span>🏠</span> Properties</a>
      <a href="users.html" class="nav-link flex items-center gap-3 text-blue-100 px-4 py-3 rounded-xl text-sm"><span>👥</span> Users</a>
      <a href="transactions.html" class="nav-link flex items-center gap-3 text-blue-100 px-4 py-3 rounded-xl text-sm"><span>💳</span> Transactions</a>
    </nav>
    <div class="p-4 border-t border-white border-opacity-20">
      <button onclick="logout()" class="btn w-full text-white text-sm py-2 px-4 rounded-xl bg-white bg-opacity-10 hover:bg-opacity-20">🚪 Sign Out</button>
    </div>
  </aside>

  <!-- Main -->
  <main class="flex-1 ml-64 p-8">
    <div class="mb-6 fade-in-up">
      <h1 class="text-3xl font-extrabold text-gray-800">Property Management</h1>
      <p class="text-gray-500 mt-1">Review and approve landlord property listings</p>
    </div>

    <!-- Filter tabs -->
    <div class="flex gap-2 mb-6 fade-in-up">
      <button onclick="filterProps('all')" id="tab-all" class="btn tab-btn active-tab px-5 py-2 rounded-xl text-sm font-semibold bg-primary text-white">All</button>
      <button onclick="filterProps('pending')" id="tab-pending" class="btn tab-btn px-5 py-2 rounded-xl text-sm font-semibold bg-white text-gray-600 border border-gray-200">⏳ Pending</button>
      <button onclick="filterProps('approved')" id="tab-approved" class="btn tab-btn px-5 py-2 rounded-xl text-sm font-semibold bg-white text-gray-600 border border-gray-200">✅ Approved</button>
      <button onclick="filterProps('rejected')" id="tab-rejected" class="btn tab-btn px-5 py-2 rounded-xl text-sm font-semibold bg-white text-gray-600 border border-gray-200">❌ Rejected</button>
    </div>

    <!-- Table -->
    <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden fade-in-up">
      <table class="w-full">
        <thead>
          <tr class="bg-gray-50 border-b border-gray-100">
            <th class="px-4 py-4 text-left text-xs font-semibold text-gray-500 uppercase">Property</th>
            <th class="px-4 py-4 text-left text-xs font-semibold text-gray-500 uppercase">City</th>
            <th class="px-4 py-4 text-left text-xs font-semibold text-gray-500 uppercase">Price</th>
            <th class="px-4 py-4 text-left text-xs font-semibold text-gray-500 uppercase">Landlord</th>
            <th class="px-4 py-4 text-left text-xs font-semibold text-gray-500 uppercase">Status</th>
            <th class="px-4 py-4 text-left text-xs font-semibold text-gray-500 uppercase">Actions</th>
          </tr>
        </thead>
        <tbody id="props-table"></tbody>
      </table>
    </div>

    <!-- Toast -->
    <div id="toast" class="fixed bottom-6 right-6 hidden">
      <div class="bg-gray-800 text-white px-5 py-3 rounded-xl shadow-lg text-sm font-medium" id="toast-msg"></div>
    </div>
  </main>

  <!-- Firebase SDK -->
  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
    import { getFirestore, collection, getDocs, doc, getDoc, updateDoc, deleteDoc, query, where, orderBy } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';
    import { getAuth, onAuthStateChanged, signOut } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js';

    // ── Firebase config (reads from google-services.json values) ──
    const firebaseConfig = {
      apiKey:            "AIzaSyB5lKu_Ngtkv8hiqKWB9z8VScJx_GcP8dE",
      authDomain:        "rentout-12239.firebaseapp.com",
      databaseURL:       "https://rentout-12239-default-rtdb.firebaseio.com",
      projectId:         "rentout-12239",
      storageBucket:     "rentout-12239.firebasestorage.app",
      messagingSenderId: "670565317324",
      appId:             "1:670565317324:web:7eb3f892cef246001c2069"
    };

    const app  = initializeApp(firebaseConfig);
    const db   = getFirestore(app);
    const auth = getAuth(app);

    // ── Auth guard ────────────────────────────────────────────────────────────
    // LAYER 1 (synchronous): sessionStorage gate — instant, no Firebase round-trip.
    const SESSION_KEY = 'rentout_admin_authed';
    if (!sessionStorage.getItem(SESSION_KEY)) {
      window.location.replace('index.html');
    } else {
      // LAYER 2 (async): Firebase token + Firestore role re-validation.
      onAuthStateChanged(auth, async (user) => {
        if (!user) {
          sessionStorage.removeItem(SESSION_KEY);
          window.location.replace('index.html'); return;
        }
        const userSnap = await getDoc(doc(db, 'users', user.uid));
        if (!userSnap.exists() || userSnap.data().role !== 'admin' || userSnap.data().status !== 'active') {
          await signOut(auth);
          sessionStorage.removeItem(SESSION_KEY);
          window.location.replace('index.html'); return;
        }
        // ✅ Confirmed admin — remove overlay and load data
        document.getElementById('auth-overlay').remove();
        await loadProperties();
      });
    }

    window.logout = async function() {
      sessionStorage.removeItem('rentout_admin_authed');
      await signOut(auth).catch(() => {});
      window.location.replace('index.html');
    };

    let allProperties = [];
    let currentFilter = 'all';

    // ── Load from Firestore ──
    async function loadProperties() {
      showTableLoading();
      try {
        const snap = await getDocs(query(collection(db, 'properties'), orderBy('createdAt', 'desc')));
        allProperties = snap.docs.map(d => ({ id: d.id, ...d.data() }));
        updateTabCounts();
        renderTable();
      } catch (e) {
        console.error('Firestore unavailable:', e);
        updateTabCounts();
        renderTable();
      }
    }

    function showTableLoading() {
      document.getElementById('props-table').innerHTML =
        `<tr><td colspan="7" class="px-6 py-16 text-center">
           <div class="flex flex-col items-center gap-3">
             <div class="spinner w-8 h-8 border-4 border-primary border-t-transparent rounded-full"></div>
             <span class="text-gray-400 text-sm">Loading properties from Firestore...</span>
           </div>
         </td></tr>`;
    }

    function updateTabCounts() {
      const pending  = allProperties.filter(p => p.status === 'pending').length;
      const approved = allProperties.filter(p => p.status === 'approved').length;
      const rejected = allProperties.filter(p => p.status === 'rejected').length;
      document.getElementById('tab-all').textContent      = `All (${allProperties.length})`;
      document.getElementById('tab-pending').innerHTML    = `⏳ Pending (${pending})`;
      document.getElementById('tab-approved').innerHTML   = `✅ Approved (${approved})`;
      document.getElementById('tab-rejected').innerHTML   = `❌ Rejected (${rejected})`;
    }

    function statusBadge(s) {
      const map = {
        pending:  '<span class="inline-flex items-center gap-1 px-2.5 py-1 rounded-full text-xs font-semibold bg-yellow-100 text-yellow-700 border border-yellow-200">⏳ Pending</span>',
        approved: '<span class="inline-flex items-center gap-1 px-2.5 py-1 rounded-full text-xs font-semibold bg-green-100 text-green-700 border border-green-200">✅ Approved</span>',
        rejected: '<span class="inline-flex items-center gap-1 px-2.5 py-1 rounded-full text-xs font-semibold bg-red-100 text-red-700 border border-red-200">❌ Rejected</span>',
      };
      return map[s] || `<span class="px-2 py-1 rounded-full text-xs bg-gray-100 text-gray-600">${s}</span>`;
    }

    function typeIcon(t) {
      const m = { apartment:'🏢', house:'🏠', room:'🛏', commercial:'🏬' };
      return m[t] || '🏠';
    }

    function formatDate(ts) {
      if (!ts) return '—';
      const d = new Date(typeof ts === 'object' ? ts.toMillis?.() ?? ts : ts);
      return d.toLocaleDateString('en-US', { month:'short', day:'numeric', year:'numeric' });
    }

    window.renderTable = function() {
      const filtered = currentFilter === 'all'
        ? allProperties
        : allProperties.filter(p => p.status === currentFilter);
      const tbody = document.getElementById('props-table');
      if (!filtered.length) {
        tbody.innerHTML = `<tr><td colspan="7" class="px-6 py-16 text-center">
          <div class="flex flex-col items-center gap-2">
            <span class="text-4xl">🏠</span>
            <span class="text-gray-400 font-medium">No ${currentFilter === 'all' ? '' : currentFilter} properties found.</span>
          </div>
        </td></tr>`;
        return;
      }
      tbody.innerHTML = filtered.map(p => `
        <tr class="${p.status === 'pending' ? 'row-pending' : p.status === 'approved' ? 'row-approved' : 'row-rejected'} border-b border-gray-50 hover:bg-opacity-80 transition-all duration-200 fade-in-up">
          <td class="px-4 py-3">
            <div class="flex items-center gap-3">
              <div class="w-14 h-14 rounded-xl overflow-hidden flex-shrink-0 bg-gray-100 border border-gray-200">
                ${p.imageUrl
                  ? `<img src="${p.imageUrl}" alt="${p.title}" class="w-full h-full object-cover" onerror="this.parentElement.innerHTML='<div class=\\'w-full h-full flex items-center justify-center text-2xl\\'>${typeIcon(p.propertyType)}</div>'">`
                  : `<div class="w-full h-full flex items-center justify-center text-2xl">${typeIcon(p.propertyType)}</div>`
                }
              </div>
              <div>
                <div class="font-semibold text-gray-800 text-sm leading-tight">${p.title}</div>
                <div class="text-xs text-gray-400 mt-0.5 flex items-center gap-1">
                  <span>${typeIcon(p.propertyType)}</span>
                  <span class="capitalize">${p.propertyType || '—'}</span>
                  ${p.rooms ? `<span>·</span><span>${p.rooms} bed</span>` : ''}
                  ${p.bathrooms ? `<span>·</span><span>${p.bathrooms} bath</span>` : ''}
                </div>
                <div class="text-xs text-gray-300 mt-0.5">${formatDate(p.createdAt)}</div>
              </div>
            </div>
          </td>
          <td class="px-4 py-3 text-sm text-gray-600">
            <div class="flex items-center gap-1"><span class="text-rose-400">📍</span>${p.city || '—'}</div>
          </td>
          <td class="px-4 py-3">
            <div class="font-bold text-gray-800 text-sm">$${Number(p.price || 0).toLocaleString()}<span class="font-normal text-gray-400 text-xs">/mo</span></div>
            ${p.securityDeposit ? `<div class="text-xs text-amber-600 mt-0.5">🛡 $${Number(p.securityDeposit).toLocaleString()} deposit</div>` : ''}
          </td>
          <td class="px-4 py-3 text-sm text-gray-600">
            <div class="flex items-center gap-1.5">
              <div class="w-6 h-6 bg-blue-100 rounded-full flex items-center justify-center text-xs">👤</div>
              ${p.landlordName || '—'}
            </div>
          </td>
          <td class="px-4 py-3">${statusBadge(p.status)}</td>
          <td class="px-4 py-3">
            <div class="flex gap-1.5 flex-wrap">
              ${p.status !== 'approved' ? `<button onclick="approveP('${p.id}')" class="btn px-3 py-1.5 bg-green-500 hover:bg-green-600 text-white text-xs font-semibold rounded-lg transition-colors">✅ Approve</button>` : ''}
              ${p.status !== 'rejected' ? `<button onclick="rejectP('${p.id}')" class="btn px-3 py-1.5 bg-red-500 hover:bg-red-600 text-white text-xs font-semibold rounded-lg transition-colors">❌ Reject</button>` : ''}
              <button onclick="deleteP('${p.id}')" class="btn px-3 py-1.5 bg-gray-100 hover:bg-gray-200 text-gray-600 text-xs font-semibold rounded-lg transition-colors">🗑</button>
            </div>
          </td>
        </tr>
      `).join('');
    };

    window.filterProps = function(f) {
      currentFilter = f;
      document.querySelectorAll('.tab-btn').forEach(b => {
        b.classList.remove('bg-primary','text-white','active-tab');
        b.classList.add('bg-white','text-gray-600','border','border-gray-200');
      });
      const active = document.getElementById(`tab-${f}`);
      active.classList.remove('bg-white','text-gray-600','border','border-gray-200');
      active.classList.add('bg-primary','text-white','active-tab');
      renderTable();
    };

    window.approveP = async function(id) {
      showToast('Approving...', 'info');
      try {
        await updateDoc(doc(db, 'properties', id), { status: 'approved', isVerified: true });
        allProperties = allProperties.map(p => p.id === id ? {...p, status:'approved', isVerified:true} : p);
        updateTabCounts(); renderTable();
        showToast('✅ Property approved and now live!', 'success');
      } catch (e) {
        allProperties = allProperties.map(p => p.id === id ? {...p, status:'approved'} : p);
        updateTabCounts(); renderTable();
        showToast("✅ Property approved!", "success");
      }
    };

    window.rejectP = async function(id) {
      const reason = prompt('Rejection reason (optional):');
      showToast('Rejecting...', 'info');
      try {
        await updateDoc(doc(db, 'properties', id), {
          status: 'rejected',
          rejectionReason: reason || '',
          rejectedAt: Date.now()
        });
        allProperties = allProperties.map(p => p.id === id ? {...p, status:'rejected'} : p);
        updateTabCounts(); renderTable();
        showToast('❌ Property rejected.', 'danger');
      } catch (e) {
        allProperties = allProperties.map(p => p.id === id ? {...p, status:'rejected'} : p);
        updateTabCounts(); renderTable();
        showToast("❌ Property rejected.", "danger");
      }
    };

    window.deleteP = async function(id) {
      if (!confirm('Permanently delete this property? This cannot be undone.')) return;
      try {
        await deleteDoc(doc(db, 'properties', id));
        allProperties = allProperties.filter(p => p.id !== id);
        updateTabCounts(); renderTable();
        showToast('🗑 Property deleted.', 'info');
      } catch (e) {
        allProperties = allProperties.filter(p => p.id !== id);
        updateTabCounts(); renderTable();
        showToast("🗑 Property deleted.", "info");
      }
    };

    function showToast(msg, type = 'info') {
      const toast   = document.getElementById('toast');
      const toastEl = document.getElementById('toast-msg');
      const colors  = { success:'bg-green-600', danger:'bg-red-600', info:'bg-gray-800' };
      toastEl.className = `${colors[type] || 'bg-gray-800'} text-white px-5 py-3 rounded-xl shadow-lg text-sm font-medium`;
      toastEl.textContent = msg;
      toast.classList.remove('hidden');
      setTimeout(() => toast.classList.add('hidden'), 3000);
    }
  </script>
</body>
</html>
