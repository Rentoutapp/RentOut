  <style>
    @keyframes fadeInUp { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }
    @keyframes spin { to{transform:rotate(360deg)} }
    .fade-in-up { animation: fadeInUp 0.5s ease forwards; }
    .spinner { animation: spin 0.9s linear infinite; }
    .btn { transition: transform 0.15s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.15s ease; }

    .btn:active { transform: scale(0.93); }
    .nav-link { transition: all 0.2s ease; }
    .nav-link:hover { background: rgba(255,255,255,0.15); transform: translateX(4px); }
    .nav-link.active { background: rgba(255,255,255,0.2); font-weight: 700; }

    /* ── Notification panel ───────────────────────────── */
    .notif-tab { font-size:11px;font-weight:600;padding:5px 11px;border-radius:20px;cursor:pointer;transition:all .15s;color:rgba(255,255,255,.6);background:transparent;border:none;white-space:nowrap; }
    .notif-tab:hover { background:rgba(255,255,255,.12);color:#fff; }
    .notif-tab.active { background:rgba(255,255,255,.22);color:#fff; }
    .notif-card { margin:0 8px 6px;border-radius:14px;overflow:hidden;transition:box-shadow .2s,transform .15s;cursor:pointer; }
    .notif-card:hover { box-shadow:0 4px 18px rgba(0,0,0,.09);transform:translateY(-1px); }
    .notif-card-inner { display:flex;align-items:flex-start;gap:10px;padding:10px 12px 8px; }
    .notif-icon { width:34px;height:34px;border-radius:10px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:15px; }
    .notif-dot { width:7px;height:7px;border-radius:50%;flex-shrink:0;margin-top:4px;animation:pulse-dot 2s ease-in-out infinite; }
    .notif-title { font-size:11.5px;font-weight:700;color:#111827;line-height:1.3; }
    .notif-msg-preview { font-size:10.5px;color:#6b7280;line-height:1.45;margin-top:2px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden; }
    .notif-expanded-body { max-height:0;overflow:hidden;transition:max-height .35s cubic-bezier(.4,0,.2,1),opacity .25s;opacity:0; }
    .notif-expanded-body.open { max-height:240px;opacity:1; }
    .notif-expanded-inner { padding:8px 12px 10px 56px;border-top:1px solid #f3f4f6; }
    .notif-meta { display:flex;align-items:center;gap:5px;margin-top:5px;flex-wrap:wrap; }
    .notif-tag { font-size:10px;font-weight:600;padding:2px 7px;border-radius:20px; }
    .notif-time { font-size:10px;color:#9ca3af;margin-left:auto;white-space:nowrap; }
    .notif-action-btn { font-size:10px;font-weight:700;padding:4px 10px;border-radius:8px;border:none;cursor:pointer;transition:all .15s; }
    .notif-section-header { display:flex;align-items:center;justify-content:space-between;padding:10px 14px 5px;position:sticky;top:0;z-index:2;backdrop-filter:blur(8px); }
    .notif-section-label { font-size:10px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;display:flex;align-items:center;gap:6px; }
    .notif-section-count { font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;min-width:22px;text-align:center; }
    .notif-shimmer { height:64px;margin:0 8px 6px;border-radius:14px;background:linear-gradient(90deg,#f8fafc 25%,#f1f5f9 50%,#f8fafc 75%);background-size:200% 100%;animation:shimmer 1.3s infinite; }
    .notif-reading { animation:notifSlideRead .42s cubic-bezier(.4,0,1,1) forwards;pointer-events:none; }
    #notif-list::-webkit-scrollbar { width:3px; }
    #notif-list::-webkit-scrollbar-thumb { background:#e2e8f0;border-radius:4px; }
    @keyframes pulse-dot { 0%,100%{transform:scale(1);opacity:1} 50%{transform:scale(1.4);opacity:.7} }
    @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }
    @keyframes notifSlideRead { 0%{opacity:1;transform:translateX(0) scale(1)} 40%{opacity:.4;transform:translateX(30px) scale(.97)} 100%{opacity:0;transform:translateX(60px) scale(.95);max-height:0;padding:0;margin:0} }
    @keyframes notifAppear { 0%{opacity:0;transform:translateX(40px) scale(.95)} 100%{opacity:1;transform:none} }

          <div style="flex:1;background:rgba(239,68,68,0.25);border-radius:10px;padding:7px 6px;text-align:center;border:1px solid rgba(239,68,68,0.4);"><div id="ns-unread-val" style="color:#fca5a5;font-size:17px;font-weight:800;">—</div><div style="color:rgba(252,165,165,0.7);font-size:9px;font-weight:600;text-transform:uppercase;margin-top:2px;">Unread</div></div>

  <!-- Firebase SDK -->
  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
    import { getFirestore, collection, getDocs, doc, getDoc, updateDoc, deleteDoc, query, where, orderBy, onSnapshot, writeBatch, limit } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';
    import { getAuth, onAuthStateChanged, signOut } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js';

    // -- Firebase config (reads from google-services.json values) --
    const firebaseConfig = {
      apiKey:            "AIzaSyB5lKu_Ngtkv8hiqKWB9z8VScJx_GcP8dE",
      authDomain:        "rentout-12239.firebaseapp.com",
      databaseURL:       "https://rentout-12239-default-rtdb.firebaseio.com",
      projectId:         "rentout-12239",
      storageBucket:     "rentout-12239.firebasestorage.app",
      messagingSenderId: "670565317324",
      appId:             "1:670565317324:web:7eb3f892cef246001c2069"
    };

    const app  = initializeApp(firebaseConfig);
    const db   = getFirestore(app);
    const auth = getAuth(app);

    // -- Auth guard ------------------------------------------------------------
    // LAYER 1 (synchronous): sessionStorage gate — instant, no Firebase round-trip.
    const SESSION_KEY = 'rentout_admin_authed';
    if (!sessionStorage.getItem(SESSION_KEY)) {
      window.location.replace('index.html');
    } else {
      // LAYER 2 (async): Firebase token + Firestore role re-validation.
      onAuthStateChanged(auth, async (user) => {
        if (!user) {
          sessionStorage.removeItem(SESSION_KEY);
          window.location.replace('index.html'); return;
        }
        const userSnap = await getDoc(doc(db, 'users', user.uid));
        if (!userSnap.exists() || userSnap.data().role !== 'admin' || userSnap.data().status !== 'active') {
          await signOut(auth);
          sessionStorage.removeItem(SESSION_KEY);
          window.location.replace('index.html'); return;
        }
        // Confirmed admin — remove overlay, wire notification helpers, load data
        document.getElementById('auth-overlay').remove();
        window.db = db;
        window.__fsHelpers = { collection, query, orderBy, limit, onSnapshot, updateDoc, writeBatch, doc,
          deleteDoc: async (ref) => { const { deleteDoc } = await import('https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js'); return deleteDoc(ref); },
          getDocs, getDoc, where };
        startNotifListener(user.uid);
        await loadProperties();
      });
    }

    window.logout = async function() {
      sessionStorage.removeItem('rentout_admin_authed');
      await signOut(auth).catch(() => {});
      window.location.replace('index.html');
    };

    // ── Notification Panel ────────────────────────────────────────────────────
    let notifPanelOpen = false;
    let allNotifications = [];
    let notifUnsubscribe = null;
    let activeNotifFilter = 'all';
    let expandedNotifId = null;

    window.toggleNotifPanel = function() {
      notifPanelOpen = !notifPanelOpen;
      const panel    = document.getElementById('notif-panel');
      const backdrop = document.getElementById('notif-backdrop');
      if (notifPanelOpen) {
        panel.style.transform = 'translateX(0)';
        backdrop.classList.remove('hidden');
        document.body.style.overflow = 'hidden';
      } else {
        panel.style.transform = 'translateX(100%)';
        backdrop.classList.add('hidden');
        document.body.style.overflow = '';
      }
    };

    window.filterNotifs = function(filter) {
      activeNotifFilter = filter;
      ['all','unread','read','payment','listing'].forEach(f => {
        const el = document.getElementById('ntab-' + f);
        if (el) el.classList.toggle('active', f === filter);
      });
      applyNotifFilter();
    };

    function applyNotifFilter() {
      let filtered = allNotifications;
      if (activeNotifFilter === 'unread') filtered = allNotifications.filter(n => !n.isRead);
      else if (activeNotifFilter === 'read') filtered = allNotifications.filter(n => n.isRead);
      else if (activeNotifFilter === 'payment') filtered = allNotifications.filter(n => ['payment_confirmed','unlock_success','property_unlocked'].includes(n.type));
      else if (activeNotifFilter === 'listing') filtered = allNotifications.filter(n => ['listing_approved','listing_rejected','listing_pending','listing_flagged','property_updated','property_removed'].includes(n.type));
      renderNotifList(filtered);
    }

    document.addEventListener('keydown', (e) => { if (e.key === 'Escape' && notifPanelOpen) toggleNotifPanel(); });

    function resolveTimestamp(raw) {
      if (!raw) return 0;
      if (typeof raw === 'object' && raw !== null && typeof raw.seconds === 'number') return raw.seconds * 1000 + Math.floor((raw.nanoseconds || 0) / 1e6);
      const n = Number(raw);
      if (!Number.isFinite(n) || n <= 0) return 0;
      return n < 1e12 ? n * 1000 : n;
    }

    function startNotifListener(adminUid) {
      const q = query(collection(db, 'notifications'), orderBy('createdAt', 'desc'), limit(50));
      notifUnsubscribe = onSnapshot(q, { includeMetadataChanges: false }, (snap) => {
        allNotifications = snap.docs.map(d => { const data = d.data(); return { id: d.id, ...data, _ts: resolveTimestamp(data.createdAt) }; });
        recomputeAndRender();
      }, (err) => { console.warn('Notification listener error:', err); });
    }

    function recomputeAndRender() {
      const unread = allNotifications.filter(n => !n.isRead).length;
      const readCount = allNotifications.filter(n => n.isRead).length;
      const total = allNotifications.length;
      const todayCount = allNotifications.filter(n => new Date(n._ts).toDateString() === new Date().toDateString()).length;
      const badge = document.getElementById('notif-badge');
      if (badge) { if (unread > 0) { badge.textContent = unread > 99 ? '99+' : unread; badge.classList.remove('hidden'); } else { badge.classList.add('hidden'); } }
      const subtitle = document.getElementById('notif-panel-subtitle');
      if (subtitle) subtitle.textContent = unread > 0 ? `${unread} unread · ${readCount} read` : 'All caught up ✓';
      const markAllBtn = document.getElementById('mark-all-btn');
      const clearAllBtn = document.getElementById('clear-all-btn');
      if (markAllBtn) markAllBtn.style.display = unread > 0 ? 'inline-block' : 'none';
      if (clearAllBtn) clearAllBtn.style.display = total > 0 ? 'inline-block' : 'none';
      const sv = (id, v) => { const el = document.getElementById(id); if (el) el.textContent = v ?? '—'; };
      sv('ns-total-val', total); sv('ns-unread-val', unread); sv('ns-read-val', readCount); sv('ns-today-val', todayCount);
      applyNotifFilter();
    }

    function typeEmoji(type) { return ({listing_approved:'✅',listing_rejected:'❌',listing_pending:'⏳',listing_flagged:'🚩',property_unlocked:'🔓',account_suspended:'🚫',unlock_success:'🔑',payment_confirmed:'💳',property_updated:'✏️',property_removed:'🗑',welcome:'👋',system:'🔔'})[type]||'🔔'; }
    function typeColor(type) { if(['listing_approved','unlock_success','payment_confirmed'].includes(type))return'#10b981'; if(['listing_rejected','property_removed','account_suspended'].includes(type))return'#ef4444'; if(type==='listing_pending')return'#f59e0b'; if(type==='listing_flagged')return'#f97316'; if(type==='property_unlocked')return'#8b5cf6'; if(type==='property_updated')return'#3b82f6'; if(type==='welcome')return'#06b6d4'; return'#94a3b8'; }
    function typeLabel(type) { return ({listing_approved:'Approved',listing_rejected:'Rejected',listing_pending:'Pending',listing_flagged:'Flagged',property_unlocked:'Unlocked',account_suspended:'Suspended',unlock_success:'Unlock',payment_confirmed:'Payment',property_updated:'Updated',property_removed:'Removed',welcome:'Welcome',system:'System'})[type]||type||'Notice'; }

    let allProperties = [];

    // -- Load from Firestore --
    async function loadProperties() {
      showTableLoading();
      try {
        // Primary query: ordered by createdAt descending (requires index)
        const snap = await getDocs(query(collection(db, 'properties'), orderBy('createdAt', 'desc')));
        allProperties = snap.docs.map(d => ({ id: d.id, ...d.data() }));
        updateTabCounts();
        renderTable();
      } catch (e) {
        console.error('[RentOut] loadProperties error:', e.code, e.message);
        if (e.code === 'failed-precondition' || e.code === 'unimplemented') {
          // Index not ready — fall back to unordered fetch and sort client-side
          console.warn('[RentOut] Falling back to unordered fetch (index not ready)');
          try {
            const snap = await getDocs(collection(db, 'properties'));
            allProperties = snap.docs
              .map(d => ({ id: d.id, ...d.data() }))
              .sort((a, b) => {
                const ta = typeof a.createdAt === 'object' ? (a.createdAt?.toMillis?.() ?? 0) : (a.createdAt || 0);
                const tb = typeof b.createdAt === 'object' ? (b.createdAt?.toMillis?.() ?? 0) : (b.createdAt || 0);
                return tb - ta;
              });
            updateTabCounts();
            renderTable();
          } catch (e2) {
            console.error('[RentOut] Fallback fetch also failed:', e2.code, e2.message);
            showTableError(e2);
          }
        } else {
          showTableError(e);

      }

    window.approveP = async function(id) {

      try {
        const prop = allProperties.find(p => p.id === id);
        if (!prop) { showToast('❌ Property not found.', 'danger'); return; }

        // Write all fields needed for the tenant dashboard query to work:
        // status='approved' triggers the tenant real-time listener.
        // isAvailable=true ensures the property shows as available.
        // isVerified=true marks it as admin-reviewed.
        await updateDoc(doc(db, 'properties', id), {
          status:      'approved',
          isVerified:  true,
          isAvailable: true,
          approvedAt:  Date.now()
        });

        // Update local state immediately
        allProperties = allProperties.map(p =>
          p.id === id ? { ...p, status: 'approved', isVerified: true, isAvailable: true } : p
        );
        updateTabCounts(); renderTable();
        showToast('✅ Property approved and now live for tenants!', 'success');

        // Send a notification to the landlord
        try {
          const { addDoc, collection: col, serverTimestamp } =
            await import('https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js');
          await addDoc(col(db, 'notifications'), {
            recipientId:   prop.landlordId || '',
            title:         '🎉 Property Approved!',
            message:       `Your listing "${prop.title || 'Your property'}" has been approved and is now live for tenants to browse.`,
            type:          'listing_approved',
            role:          'landlord',
            propertyId:    id,
            propertyTitle: prop.title || '',
            isRead:        false,
            createdAt:     Date.now()
          });
        } catch (notifErr) {
          console.warn('[RentOut] Could not send approval notification:', notifErr);
        }
      } catch (e) {
        console.error('[RentOut] approveP error:', e.code, e.message);
        showToast(`❌ Approval failed: ${e.message || e.code || 'Unknown error'}`, 'danger');
      }
    };

      if (reason === null) return; // user cancelled the prompt
      showToast('Rejecting...', 'info');
      try {
        const prop = allProperties.find(p => p.id === id);
        if (!prop) { showToast('❌ Property not found.', 'danger'); return; }

        await updateDoc(doc(db, 'properties', id), {
          status:          'rejected',
          isVerified:      false,
          isAvailable:     false,
          rejectionReason: reason || '',
          rejectedAt:      Date.now()

            propertyId:    id,
            propertyTitle: prop.title || '',
            isRead:        false,
            createdAt:     Date.now()

        } catch (notifErr) {
          console.warn('[RentOut] Could not send rejection notification:', notifErr);
        }
      } catch (e) {
        console.error('[RentOut] rejectP error:', e.code, e.message);
        showToast(`❌ Rejection failed: ${e.message || e.code || 'Unknown error'}`, 'danger');
      }

      try {
        await deleteDoc(doc(db, 'properties', id));
        allProperties = allProperties.filter(p => p.id !== id);
        updateTabCounts(); renderTable();
        showToast('🗑 Property deleted.', 'info');
      } catch (e) {
        allProperties = allProperties.filter(p => p.id !== id);
        updateTabCounts(); renderTable();
        showToast("🗑 Property deleted.", "info");
      }
    };

    window.viewProperty = function(id) {
      window.location.href = `property-detail.html?id=${id}`;
    };

    function showToast(msg, type = 'info') {
      const toast   = document.getElementById('toast');
      const toastEl = document.getElementById('toast-msg');
      const colors  = { success:'bg-green-600', danger:'bg-red-600', info:'bg-gray-800' };
      toastEl.className = `${colors[type] || 'bg-gray-800'} text-white px-5 py-3 rounded-xl shadow-lg text-sm font-medium`;
      toastEl.textContent = msg;
      toast.classList.remove('hidden');
      setTimeout(() => toast.classList.add('hidden'), 3000);
    }
  </script>
</body>
</html>
