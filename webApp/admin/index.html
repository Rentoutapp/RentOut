<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>RentOut Admin — Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#1B4FFF',
            secondary: '#FF6B35',
            success: '#22C55E',
            danger: '#EF4444',
            warning: '#F59E0B',
          }
        }
      }
    }
  </script>
  <style>
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    .fade-in-up { animation: fadeInUp 0.6s ease forwards; }
    .spinner { animation: spin 0.9s linear infinite; }
    .btn {
      transition: transform 0.15s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.15s ease;
    }
    .btn:hover  { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,0,0,0.15); }
    .btn:active { transform: scale(0.93); box-shadow: 0 2px 6px rgba(0,0,0,0.12); }
  </style>
</head>
<body class="min-h-screen bg-gradient-to-br from-blue-900 via-primary to-blue-800 flex items-center justify-center p-4">

  <div class="w-full max-w-md fade-in-up">
    <!-- Logo -->
    <div class="text-center mb-8">
      <div class="inline-flex items-center justify-center w-20 h-20 bg-white bg-opacity-20 rounded-3xl mb-4">
        <span class="text-4xl">🏠</span>
      </div>
      <h1 class="text-3xl font-extrabold text-white">RentOut</h1>
      <p class="text-blue-200 mt-1">Admin Control Panel</p>
    </div>

    <!-- Card -->
    <div class="bg-white rounded-3xl shadow-2xl p-8">
      <h2 class="text-2xl font-bold text-gray-800 mb-2">Welcome back</h2>
      <p class="text-gray-500 mb-6 text-sm">Sign in to manage your platform</p>

      <div id="error-box" class="hidden mb-4 p-3 bg-red-50 border border-red-200 rounded-xl text-red-600 text-sm flex items-center gap-2">
        <span>⚠️</span><span id="error-msg"></span>
      </div>

      <form id="login-form" class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Email Address</label>
          <input id="email" type="email" placeholder="admin@rentout.demo"
            class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition text-sm"
            required/>
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
          <input id="password" type="password" placeholder="••••••••"
            class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition text-sm"
            required/>
        </div>
        <button type="submit" id="login-btn"
          class="btn w-full bg-primary text-white font-semibold py-3 rounded-xl text-sm mt-2">
          Sign In to Admin Panel
        </button>
      </form>

      <div class="mt-6 p-3 bg-blue-50 rounded-xl">
        <p class="text-xs font-semibold text-primary mb-1">Demo credentials:</p>
        <p class="text-xs text-gray-500">admin@rentout.demo / demo1234!</p>
      </div>
    </div>
  </div>

  <script type="module">
    // Demo auth — replace with Firebase Auth when connected
    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('login-btn');
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const errorBox = document.getElementById('error-box');
      const errorMsg = document.getElementById('error-msg');

      btn.textContent = 'Signing in...';
      btn.disabled = true;

      await new Promise(r => setTimeout(r, 800));

      if (email === 'admin@rentout.demo' && password === 'demo1234!') {
        sessionStorage.setItem('rentout_admin', JSON.stringify({ email, role: 'admin' }));
        window.location.href = './dashboard.html';
      } else {
        errorBox.classList.remove('hidden');
        errorMsg.textContent = 'Invalid credentials. Access denied.';
        btn.textContent = 'Sign In to Admin Panel';
        btn.disabled = false;
      }
    });

    // Check if already logged in
    if (sessionStorage.getItem('rentout_admin')) {
      window.location.href = './dashboard.html';
    }
  </script>
</body>
</html>
