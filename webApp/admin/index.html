<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <title>RentOut Admin — Login</title>
  
  <!-- Favicons -->
  <link rel="icon" type="image/x-icon" href="/admin/favicon.ico">
  <link rel="icon" type="image/png" sizes="32x32" href="/admin/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/admin/favicon-16x16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/admin/apple-touch-icon.png">
  <link rel="manifest" href="/admin/site.webmanifest">
  
  <!-- Landscape Orientation Enforcer -->
  <script src="landscape-enforcer.js"></script>
  <!-- Security headers -->
  <meta http-equiv="X-Content-Type-Options" content="nosniff"/>
  <meta http-equiv="X-Frame-Options" content="DENY"/>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary:   '#1B4FFF',
            secondary: '#FF6B35',
            success:   '#22C55E',
            danger:    '#EF4444',
            warning:   '#F59E0B',
          }
        }
      }
    }
  </script>
  <style>
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .fade-in-up { animation: fadeInUp 0.6s ease forwards; }
    .btn { transition: transform 0.15s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.15s ease; }
    .btn:hover  { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,0,0,0.15); }
    .btn:active { transform: scale(0.93); box-shadow: 0 2px 6px rgba(0,0,0,0.12); }
  </style>
</head>
<body class="min-h-screen bg-gradient-to-br from-blue-900 via-primary to-blue-800 flex items-center justify-center p-4">

  <div class="w-full max-w-md fade-in-up">

    <!-- Logo -->
    <div class="text-center mb-8">
      <div class="inline-flex items-center justify-center w-20 h-20 bg-white bg-opacity-20 rounded-3xl mb-4">
        <span class="text-4xl">🏠</span>
      </div>
      <h1 class="text-3xl font-extrabold text-white">RentOut</h1>
      <p class="text-blue-200 mt-1">Admin Control Panel</p>
    </div>

    <!-- Card -->
    <div class="bg-white rounded-3xl shadow-2xl p-8">
      <h2 class="text-2xl font-bold text-gray-800 mb-2">Sign In</h2>
      <p class="text-gray-500 mb-6 text-sm">Enter your admin credentials to continue</p>

      <!-- Error box -->
      <div id="error-box" class="hidden mb-4 p-3 bg-red-50 border border-red-200 rounded-xl text-red-600 text-sm flex items-center gap-2">
        <span>⚠️</span><span id="error-msg"></span>
      </div>

      <!--
        SECURITY:
        - autocomplete="off" on the form and both inputs — no browser/password manager fill
        - No name attributes that browsers recognise as login fields
        - Fields are cleared programmatically on load (0 ms, 100 ms, 300 ms) to defeat
          any browser that ignores autocomplete="off"
        - No credential is ever written to localStorage or sessionStorage
        - Firebase token uses browserSessionPersistence — cleared when the tab closes
        - The only persistent state is the sessionStorage gate flag (a single '1')
          that protected pages check synchronously to avoid the auth flash
      -->
      <form id="login-form" class="space-y-5" autocomplete="off">

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Email Address</label>
          <input id="email"
            type="email"
            autocomplete="off"
            spellcheck="false"
            placeholder="Enter admin email"
            class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition text-sm"
            required/>
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
          <div class="relative">
            <input id="password"
              type="password"
              autocomplete="off"
              placeholder="Enter password"
              class="w-full px-4 py-3 pr-12 rounded-xl border border-gray-200 focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition text-sm"
              required/>
            <!-- Show/hide password -->
            <button type="button" id="toggle-pw"
              class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600 text-lg focus:outline-none"
              aria-label="Toggle password visibility" tabindex="-1">👁</button>
          </div>
        </div>

        <button type="submit" id="login-btn"
          class="btn w-full bg-primary text-white font-semibold py-3 rounded-xl text-sm flex items-center justify-center gap-2">
          <span id="btn-text">Sign In to Admin Panel</span>
        </button>

      </form>

      <div class="mt-6 p-3 bg-blue-50 rounded-xl">
        <p class="text-xs font-semibold text-primary mb-1">🔒 Admin access only</p>
        <p class="text-xs text-gray-500">Only verified admin accounts can access this panel. Credentials are never stored.</p>
      </div>
    </div>

  </div>

  <script type="module">
    import { initializeApp }             from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
    import { getAuth,
             signInWithEmailAndPassword,
             signOut,
             setPersistence,
             browserSessionPersistence } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js';
    import { getFirestore, doc, getDoc } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';

    // ── Firebase init ──────────────────────────────────────────────────────────
    const firebaseConfig = {
      apiKey:            "AIzaSyB5lKu_Ngtkv8hiqKWB9z8VScJx_GcP8dE",
      authDomain:        "rentout-12239.firebaseapp.com",
      databaseURL:       "https://rentout-12239-default-rtdb.firebaseio.com",
      projectId:         "rentout-12239",
      storageBucket:     "rentout-12239.firebasestorage.app",
      messagingSenderId: "670565317324",
      appId:             "1:670565317324:web:7eb3f892cef246001c2069"
    };
    const app  = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db   = getFirestore(app);

    // ── SESSION_KEY: the only thing ever written to sessionStorage ─────────────
    // This is a single '1' flag — no credentials, no email, no token.
    // Protected pages read it synchronously on load to avoid the auth flash.
    // It is cleared here on every login page load, and on logout on every page.
    const SESSION_KEY = 'rentout_admin_authed';

    // ── Element refs ───────────────────────────────────────────────────────────
    const emailInput    = document.getElementById('email');
    const passwordInput = document.getElementById('password');
    const loginBtn      = document.getElementById('login-btn');
    const btnText       = document.getElementById('btn-text');
    const errorBox      = document.getElementById('error-box');
    const errorMsg      = document.getElementById('error-msg');
    const togglePw      = document.getElementById('toggle-pw');

    // ── Step 1: Purge ALL stored credentials and auth state ────────────────────
    // Clear every possible storage location — no credential survives page load.
    sessionStorage.clear();
    localStorage.removeItem('rentout_admin_remember');
    localStorage.removeItem('rentout_admin_email');

    // Sign out from Firebase — awaited so the SDK's cached token is fully cleared
    // before the form renders. Zero race condition.
    await signOut(auth).catch(() => {});

    // ── Step 2: Clear form fields repeatedly to defeat browser autofill ────────
    // Browsers inject saved values asynchronously after parse. We clear at
    // 0 ms, 100 ms, and 500 ms to catch all known autofill injection timings.
    function clearFields() {
      emailInput.value    = '';
      passwordInput.value = '';
    }
    clearFields();
    setTimeout(clearFields, 100);
    setTimeout(clearFields, 500);

    // ── Show/hide password ─────────────────────────────────────────────────────
    togglePw.addEventListener('click', () => {
      const hidden = passwordInput.type === 'password';
      passwordInput.type   = hidden ? 'text' : 'password';
      togglePw.textContent = hidden ? '🙈' : '👁';
    });

    // ── Form submission ────────────────────────────────────────────────────────
    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();

      const email    = emailInput.value.trim();
      const password = passwordInput.value;

      if (!email || !password) {
        showError('Please enter both email and password.');
        return;
      }

      setLoading(true);
      hideError();

      try {
        // SECURITY: browserSessionPersistence — Firebase auth token lives only
        // in memory for the current tab. Closing the tab destroys it completely.
        // It is NEVER written to localStorage, IndexedDB, or any disk storage.
        await setPersistence(auth, browserSessionPersistence);

        const cred = await signInWithEmailAndPassword(auth, email, password);

        // ── Firestore double-verification ──────────────────────────────────────
        // Firebase Auth confirms the password is correct.
        // Firestore users/{uid} confirms role === 'admin' AND status === 'active'.
        // Both must pass — neither alone is sufficient.
        const snap     = await getDoc(doc(db, 'users', cred.user.uid));
        const isAdmin  = snap.exists() && snap.data().role   === 'admin';
        const isActive = snap.exists() && snap.data().status === 'active';

        if (isAdmin && isActive) {
          // ✅ Fully verified admin — write the session gate flag and navigate.
          // This flag is the ONLY thing written to storage. It contains no
          // credentials, no email, no token — just the presence check ('1').
          sessionStorage.setItem(SESSION_KEY, '1');
          // Clear the password from memory immediately after success
          passwordInput.value = '';
          window.location.replace('./dashboard.html');
        } else {
          // ❌ Valid Firebase Auth but NOT an active admin — deny and clean up
          await signOut(auth);
          sessionStorage.removeItem(SESSION_KEY);
          // Clear fields immediately on denial
          clearFields();
          if (!snap.exists()) {
            throw new Error('Account not found in the system. Contact your system administrator.');
          } else if (!isAdmin) {
            throw new Error('Access denied. This account does not have admin privileges.');
          } else {
            throw new Error('Access denied. This admin account has been suspended.');
          }
        }
      } catch (err) {
        // Immediately clear the password field on any error
        passwordInput.value = '';

        let msg = err.message || 'An error occurred. Please try again.';

        // Map Firebase Auth error codes to safe, non-leaking messages
        if (msg.includes('invalid-credential') ||
            msg.includes('wrong-password')     ||
            msg.includes('user-not-found')     ||
            msg.includes('invalid-email')      ||
            msg.includes('INVALID_LOGIN_CREDENTIALS')) {
          // Intentionally vague — don't reveal whether the email exists
          msg = 'Incorrect email or password. Please try again.';
        } else if (msg.includes('too-many-requests')) {
          msg = 'Too many failed attempts. Please wait a few minutes and try again.';
        } else if (msg.includes('network-request-failed')) {
          msg = 'Network error. Please check your connection and try again.';
        } else if (msg.includes('Access denied') || msg.includes('Account not found') || msg.includes('suspended')) {
          // Pass these through as-is — they are our own safe messages above
        } else {
          // Fallback — strip any raw Firebase internals
          msg = msg.replace('Firebase: ', '').replace(/\s*\(auth\/[^)]+\)\.?/g, '').trim();
          if (!msg) msg = 'An error occurred. Please try again.';
        }

        showError(msg);
        setLoading(false);
      }
    });

    // ── Helpers ────────────────────────────────────────────────────────────────
    function setLoading(loading) {
      loginBtn.disabled   = loading;
      btnText.textContent = loading ? 'Signing in…' : 'Sign In to Admin Panel';
    }
    function showError(msg) {
      errorMsg.textContent = msg;
      errorBox.classList.remove('hidden');
    }
    function hideError() {
      errorBox.classList.add('hidden');
    }
  </script>
</body>
</html>
