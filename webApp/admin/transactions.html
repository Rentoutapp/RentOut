<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Transactions — RentOut Admin</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    :root { --primary: #6C63FF; }
    .bg-primary { background-color: var(--primary); }
    .text-primary { color: var(--primary); }
    .spinner { animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .fade-in-up { animation: fadeUp 0.3s ease both; }
    @keyframes fadeUp { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:none; } }
    .active-tab { background: var(--primary) !important; color: white !important; }
  </style>
</head>
<body class="bg-gray-50 min-h-screen font-sans">

  <!-- Sidebar -->
  <div class="fixed inset-y-0 left-0 w-64 bg-white shadow-lg z-30 flex flex-col">
    <div class="p-6 border-b border-gray-100">
      <div class="flex items-center gap-3">
        <div class="w-10 h-10 bg-primary rounded-xl flex items-center justify-center text-white font-bold text-lg">R</div>
        <div>
          <div class="font-bold text-gray-800">RentOut</div>
          <div class="text-xs text-gray-400">Admin Dashboard</div>
        </div>
      </div>
    </div>
    <nav class="flex-1 p-4 space-y-1">
      <a href="dashboard.html" class="flex items-center gap-3 px-4 py-3 rounded-xl text-gray-600 hover:bg-gray-50 font-medium transition-colors">📊 Dashboard</a>
      <a href="properties.html" class="flex items-center gap-3 px-4 py-3 rounded-xl text-gray-600 hover:bg-gray-50 font-medium transition-colors">🏠 Properties</a>
      <a href="users.html" class="flex items-center gap-3 px-4 py-3 rounded-xl text-gray-600 hover:bg-gray-50 font-medium transition-colors">👥 Users</a>
      <a href="transactions.html" class="flex items-center gap-3 px-4 py-3 rounded-xl bg-purple-50 text-primary font-semibold">💳 Transactions</a>
    </nav>
    <div class="p-4 border-t border-gray-100">
      <button onclick="logout()" class="w-full flex items-center gap-2 px-4 py-2 text-red-500 hover:bg-red-50 rounded-xl font-medium transition-colors">🚪 Logout</button>
    </div>
  </div>

  <!-- Main content -->
  <div class="ml-64 p-8">
    <div class="flex items-center justify-between mb-8">
      <div>
        <h1 class="text-2xl font-bold text-gray-800">Transactions</h1>
        <p class="text-gray-400 text-sm mt-1">All property unlock payments on the platform</p>
      </div>
      <button onclick="loadTransactions()" class="flex items-center gap-2 px-4 py-2 bg-white border border-gray-200 rounded-xl text-gray-600 hover:bg-gray-50 font-medium text-sm">
        🔄 Refresh
      </button>
    </div>

    <!-- Stats -->
    <div class="grid grid-cols-4 gap-4 mb-6">
      <div class="bg-white rounded-2xl p-5 shadow-sm border border-gray-100">
        <div class="text-2xl font-bold text-gray-800" id="stat-total">—</div>
        <div class="text-sm text-gray-400 mt-1">Total Transactions</div>
      </div>
      <div class="bg-white rounded-2xl p-5 shadow-sm border border-gray-100">
        <div class="text-2xl font-bold text-green-600" id="stat-revenue">—</div>
        <div class="text-sm text-gray-400 mt-1">Total Revenue</div>
      </div>
      <div class="bg-white rounded-2xl p-5 shadow-sm border border-gray-100">
        <div class="text-2xl font-bold text-blue-600" id="stat-success">—</div>
        <div class="text-sm text-gray-400 mt-1">Successful</div>
      </div>
      <div class="bg-white rounded-2xl p-5 shadow-sm border border-gray-100">
        <div class="text-2xl font-bold text-red-500" id="stat-failed">—</div>
        <div class="text-sm text-gray-400 mt-1">Failed</div>
      </div>
    </div>

    <!-- Tabs -->
    <div class="flex gap-2 mb-4">
      <button id="tab-all"     onclick="filterTx('all')"     class="tab-btn active-tab px-4 py-2 rounded-xl text-sm font-semibold transition-all">All</button>
      <button id="tab-success" onclick="filterTx('success')" class="tab-btn bg-white text-gray-600 border border-gray-200 px-4 py-2 rounded-xl text-sm font-semibold transition-all">✅ Successful</button>
      <button id="tab-failed"  onclick="filterTx('failed')"  class="tab-btn bg-white text-gray-600 border border-gray-200 px-4 py-2 rounded-xl text-sm font-semibold transition-all">❌ Failed</button>
      <button id="tab-pending" onclick="filterTx('pending')" class="tab-btn bg-white text-gray-600 border border-gray-200 px-4 py-2 rounded-xl text-sm font-semibold transition-all">⏳ Pending</button>
    </div>

    <!-- Table -->
    <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
      <table class="w-full">
        <thead>
          <tr class="bg-gray-50 border-b border-gray-100">
            <th class="px-6 py-4 text-left text-xs font-semibold text-gray-500 uppercase">Transaction ID</th>
            <th class="px-6 py-4 text-left text-xs font-semibold text-gray-500 uppercase">Tenant</th>
            <th class="px-6 py-4 text-left text-xs font-semibold text-gray-500 uppercase">Property</th>
            <th class="px-6 py-4 text-left text-xs font-semibold text-gray-500 uppercase">Amount</th>
            <th class="px-6 py-4 text-left text-xs font-semibold text-gray-500 uppercase">Date</th>
            <th class="px-6 py-4 text-left text-xs font-semibold text-gray-500 uppercase">Status</th>
          </tr>
        </thead>
        <tbody id="tx-table">
          <tr><td colspan="6" class="px-6 py-16 text-center text-gray-400">Loading...</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <script type="module">
    import { initializeApp }   from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
    import { getFirestore, collection, getDocs, doc, getDoc, orderBy, query } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';
    import { getAuth, onAuthStateChanged, signOut } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js';

    const firebaseConfig = {
      apiKey:            "AIzaSyB5lKu_Ngtkv8hiqKWB9z8VScJx_GcP8dE",
      authDomain:        "rentout-12239.firebaseapp.com",
      databaseURL:       "https://rentout-12239-default-rtdb.firebaseio.com",
      projectId:         "rentout-12239",
      storageBucket:     "rentout-12239.firebasestorage.app",
      messagingSenderId: "670565317324",
      appId:             "1:670565317324:web:7eb3f892cef246001c2069"
    };

    const app  = initializeApp(firebaseConfig);
    const db   = getFirestore(app);
    const auth = getAuth(app);

    // Auth guard — real Firebase Auth + admin role check
    onAuthStateChanged(auth, async user => {
      if (!user) { window.location.href = 'index.html'; return; }
      const userSnap = await getDoc(doc(db, 'users', user.uid));
      if (!userSnap.exists() || userSnap.data().role !== 'admin') {
        await signOut(auth);
        window.location.href = 'index.html'; return;
      }
      await loadTransactions();
    });

    window.logout = async () => {
      await signOut(auth).catch(() => {});
      window.location.href = 'index.html';
    };

    let allTx = [];
    let currentFilter = 'all';

    window.loadTransactions = async function() {
      showLoading();
      try {
        const snap = await getDocs(query(collection(db, 'transactions'), orderBy('createdAt', 'desc')));
        allTx = snap.docs.map(d => ({ id: d.id, ...d.data() }));
        updateStats();
        renderTable();
      } catch(e) {
        document.getElementById('tx-table').innerHTML =
          `<tr><td colspan="6" class="px-6 py-16 text-center text-red-400 font-medium">
            ⚠️ Failed to load transactions. Check Firebase config and Firestore rules.
           </td></tr>`;
      }
    };

    function showLoading() {
      document.getElementById('tx-table').innerHTML =
        `<tr><td colspan="6" class="px-6 py-16 text-center">
           <div class="flex flex-col items-center gap-3">
             <div class="spinner w-8 h-8 border-4 border-purple-400 border-t-transparent rounded-full"></div>
             <span class="text-gray-400 text-sm">Loading transactions from Firestore...</span>
           </div>
         </td></tr>`;
    }

    function updateStats() {
      const success = allTx.filter(t => t.status === 'success').length;
      const failed  = allTx.filter(t => t.status === 'failed').length;
      const pending = allTx.filter(t => t.status === 'pending').length;
      const revenue = allTx.filter(t => t.status === 'success')
                           .reduce((s, t) => s + (Number(t.amount) || 0), 0);
      document.getElementById('stat-total').textContent   = allTx.length;
      document.getElementById('stat-revenue').textContent = `$${revenue.toLocaleString()}`;
      document.getElementById('stat-success').textContent = success;
      document.getElementById('stat-failed').textContent  = failed;
      document.getElementById('tab-all').textContent      = `All (${allTx.length})`;
      document.getElementById('tab-success').textContent  = `✅ Successful (${success})`;
      document.getElementById('tab-failed').textContent   = `❌ Failed (${failed})`;
      document.getElementById('tab-pending').textContent  = `⏳ Pending (${pending})`;
    }

    function statusBadge(s) {
      const m = {
        success: `<span class="px-2.5 py-1 rounded-full text-xs font-semibold bg-green-100 text-green-700 border border-green-200">✅ Success</span>`,
        failed:  `<span class="px-2.5 py-1 rounded-full text-xs font-semibold bg-red-100 text-red-700 border border-red-200">❌ Failed</span>`,
        pending: `<span class="px-2.5 py-1 rounded-full text-xs font-semibold bg-yellow-100 text-yellow-700 border border-yellow-200">⏳ Pending</span>`,
      };
      return m[s] || `<span class="px-2 py-1 rounded-full text-xs bg-gray-100 text-gray-500">${s}</span>`;
    }

    function formatDate(ts) {
      if (!ts) return '—';
      const d = new Date(typeof ts === 'object' ? ts.toMillis?.() ?? ts : ts);
      return d.toLocaleString('en-US', { month:'short', day:'numeric', year:'numeric', hour:'2-digit', minute:'2-digit' });
    }

    function shortId(id) {
      return id ? `<span class="font-mono text-xs text-gray-500">${id.substring(0, 12)}...</span>` : '—';
    }

    window.renderTable = function() {
      const filtered = currentFilter === 'all' ? allTx : allTx.filter(t => t.status === currentFilter);
      const tbody = document.getElementById('tx-table');
      if (!filtered.length) {
        tbody.innerHTML = `<tr><td colspan="6" class="px-6 py-16 text-center">
          <div class="flex flex-col items-center gap-2">
            <span class="text-4xl">💳</span>
            <span class="text-gray-400 font-medium">No ${currentFilter === 'all' ? '' : currentFilter} transactions found.</span>
          </div>
        </td></tr>`;
        return;
      }
      tbody.innerHTML = filtered.map(t => `
        <tr class="border-b border-gray-50 hover:bg-gray-50 transition-all fade-in-up">
          <td class="px-6 py-3">${shortId(t.id)}</td>
          <td class="px-6 py-3">
            <div class="font-medium text-gray-800 text-sm">${t.tenantName || t.tenantId || '—'}</div>
            <div class="text-xs text-gray-400">${t.tenantEmail || ''}</div>
          </td>
          <td class="px-6 py-3">
            <div class="font-medium text-gray-800 text-sm">${t.propertyTitle || '—'}</div>
            <div class="text-xs text-gray-400">${t.propertyId ? t.propertyId.substring(0,10)+'...' : ''}</div>
          </td>
          <td class="px-6 py-3 font-bold text-gray-800">$${Number(t.amount || 0).toFixed(2)}</td>
          <td class="px-6 py-3 text-sm text-gray-500">${formatDate(t.createdAt)}</td>
          <td class="px-6 py-3">${statusBadge(t.status)}</td>
        </tr>
      `).join('');
    };

    window.filterTx = function(f) {
      currentFilter = f;
      document.querySelectorAll('.tab-btn').forEach(b => {
        b.classList.remove('active-tab');
        b.classList.add('bg-white','text-gray-600','border','border-gray-200');
      });
      const active = document.getElementById(`tab-${f}`);
      active.classList.add('active-tab');
      active.classList.remove('bg-white','text-gray-600','border','border-gray-200');
      renderTable();
    };
  </script>
</body>
</html>
